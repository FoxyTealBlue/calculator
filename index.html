<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator!</title>
    <link href="reset.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <header>
      <h1>It's a Calculator, duh!</h1>
    </header>
    <main>
      <div id="calculator">
        <div id="display">
          <div id="history">15</div>
          <div id="current">0</div>
        </div>
        <div id="buttons">
          <div id="rowOne">
            <div id="clear" class="calculatorButton">AC</div>
            <div id="delete" class="calculatorButton">C</div>
            <div id="divide" class="calculatorButton">/</div>
            <div id="multiply" class="calculatorButton">*</div>
          </div>
          <div id="rowTwo">
            <div id="seven" class="calculatorButton">7</div>
            <div id="eight" class="calculatorButton">8</div>
            <div id="nine" class="calculatorButton">9</div>
            <div id="subtract" class="calculatorButton">-</div>
          </div>
          <div id="rowThree">
            <div id="four" class="calculatorButton">4</div>
            <div id="five" class="calculatorButton">5</div>
            <div id="six" class="calculatorButton">6</div>
            <div id="add" class="calculatorButton">+</div>
          </div>
          <div id="rowFour">
            <div id="one" class="calculatorButton">1</div>
            <div id="two" class="calculatorButton">2</div>
            <div id="three" class="calculatorButton">3</div>
            <div id="equals" class="calculatorButton">=</div>
          </div>
          <div id="rowFive">
            <div id="zero" class="calculatorButton">0</div>
            <div id="point" class="calculatorButton">.</div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
