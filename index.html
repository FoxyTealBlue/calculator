<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator!</title>
    <link href="reset.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <main>
      <div id="calculator">
        <div id="display">
          <div id="history"></div>
          <div id="current">0</div>
        </div>
        <div id="buttons">
          <div id="rowOne">
            <button id="clear" class="calculatorButton">AC</button>
            <button id="delete" class="calculatorButton">C</button>
            <button id="divide" class="calculatorButton">/</button>
            <button id="multiply" class="calculatorButton">*</button>
          </div>
          <div id="rowTwo">
            <button id="seven" class="calculatorButton">7</button>
            <button id="eight" class="calculatorButton">8</button>
            <button id="nine" class="calculatorButton">9</button>
            <button id="subtract" class="calculatorButton">-</button>
          </div>
          <div id="rowThree">
            <button id="four" class="calculatorButton">4</button>
            <button id="five" class="calculatorButton">5</button>
            <button id="six" class="calculatorButton">6</button>
            <button id="add" class="calculatorButton">+</button>
          </div>
          <div id="rowFour">
            <button id="one" class="calculatorButton">1</button>
            <button id="two" class="calculatorButton">2</button>
            <button id="three" class="calculatorButton">3</button>
            <button id="equals" class="calculatorButton">=</button>
          </div>
          <div id="rowFive">
            <button id="zero" class="calculatorButton">0</button>
            <button id="point" class="calculatorButton">.</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
